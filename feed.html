<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed — Bookgram</title>
    <link rel="stylesheet" href="feed_style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="book">

    <!-- LEFT PAGE -->
    <div class="page left">
        <header class="page-header">
            <a href="#" class="site-logo">Bookgram<span>.</span></a>
            <span class="page-num">01</span>
        </header>
        <main class="page-content" id="leftFeed"></main>
        <footer class="page-footer left-footer">
            <button class="nav-btn prev-btn">← Prev</button>
            <!-- next button shown only on mobile-->
            <button class="nav-btn next-btn mobile-next">Next →</button>
        </footer>
    </div>

    <!-- SPINE -->
    <div class="spine"></div>

    <!-- RIGHT PAGE -->
    <div class="page right">
        <header class="page-header">
            <span class="page-num">02</span>
            <a href="profile.html" class="profile-btn" title="Profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
            </a>
        </header>
        <main class="page-content" id="rightFeed"></main>
        <footer class="page-footer right-footer">
            <button class="nav-btn next-btn">Next →</button>
        </footer>
    </div>

</div>

<!-- CREATE POST -->
<div id="createPostOverlay" class="create-post-overlay">
    <div class="create-post-modal">
        <h3>Create Post</h3>
        <textarea id="postText" class="create-post-textarea"
                  placeholder="Write something..."></textarea>
        <label for="postImageFile" class="file-label">Add picture</label>
        <input type="file" id="postImageFile" accept="image/*">
        <!-- preview shown after image selected -->
        <img id="postPreview" class="post-preview hidden" alt="Preview">
        <div class="create-post-actions">
            <button id="cancelPostBtn" class="modal-btn secondary-btn">Cancel</button>
            <button id="submitPostBtn" class="modal-btn primary-btn">Post</button>
        </div>
    </div>
</div>

<!-- POST DETAIL -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-box">

        <button id="modalClose" class="modal-close">✕</button>

        <div class="modal-post-section">
            <p id="modalPostText" class="modal-post-text"></p>
            <span id="modalMeta" class="modal-meta"></span>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-comments-section">
            <h4 class="modal-section-label">Comments</h4>
            <div id="modalComments" class="modal-comments-list"></div>
        </div>

        <div class="modal-input-row">
            <input id="modalInput" class="modal-input"
                   type="text" placeholder="Add a comment…" maxlength="200">
            <button id="modalSubmit" class="modal-submit-btn">Post</button>
        </div>

    </div>
</div>

<!-- Floating post button -->
<button class="floating-post-btn" id="floatingPostBtn">+ Post</button>

<script src="feed.js"></script>
</body>
</html>
