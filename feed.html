<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio — Feed</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="feed_style.css">
</head>
<body>
<div class="book">

    <div class="page left">
        <div class="page-header">
            <a href="#" class="site-logo">Name<span>.</span></a>
            <span class="page-num">01</span>
        </div>

        <div class="page-content" id="leftFeed">
            <div class="post-card">
                <div class="post-img">
                    <img src="post1.jpg" alt="Post image">
                    <div class="img-caption">A quiet morning.</div>
                </div>
                <div class="post-footer">
                    <div class="post-meta">
                        <span class="post-username">@kanita</span>
                        <span class="post-date">Mar 23</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn like-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            <span class="count">12</span>
                        </button>
                        <button class="action-btn comment-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span class="count">3</span>
                        </button>
                    </div>
                </div>
                <div class="comments-box"></div>
            </div>

            <div class="post-card">
                <div class="post-img">
                    <img src="post2.jpg" alt="Post image">
                    <div class="img-caption">green</div>
                </div>
                <div class="post-footer">
                    <div class="post-meta">
                        <span class="post-username">@maha</span>
                        <span class="post-date">Mar 22</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn like-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            <span class="count">5</span>
                        </button>
                        <button class="action-btn comment-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span class="count">1</span>
                        </button>
                    </div>
                </div>
                <div class="comments-box"></div>
            </div>
        </div>

        <div class="page-footer">
            <button class="nav-btn">← Prev</button>
            <button class="nav-btn">Next →</button>
        </div>
    </div>

    <div class="spine"></div>

    <div class="page right">
        <div class="page-header">
            <span class="page-num">02</span>
            <button class="profile-btn">V</button>
        </div>

        <div class="page-content" id="rightFeed">
            <div class="post-card">
                <div class="post-img">
                    <img src="post3.jpg" alt="Post image">
                    <div class="img-caption">peace.</div>
                </div>
                <div class="post-footer">
                    <div class="post-meta">
                        <span class="post-username">@humdia</span>
                        <span class="post-date">Mar 21</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn like-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            <span class="count">8</span>
                        </button>
                        <button class="action-btn comment-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span class="count">2</span>
                        </button>
                    </div>
                </div>
                <div class="comments-box"></div>
            </div>

            <div class="post-card">
                <div class="post-img">
                    <img src="post4.jpg" alt="Post image">
                    <div class="img-caption">sunset.</div>
                </div>
                <div class="post-footer">
                    <div class="post-meta">
                        <span class="post-username">@fatima</span>
                        <span class="post-date">Mar 20</span>
                    </div>
                    <div class="post-actions">
                        <button class="action-btn like-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            <span class="count">20</span>
                        </button>
                        <button class="action-btn comment-btn">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            <span class="count">6</span>
                        </button>
                    </div>
                </div>
                <div class="comments-box"></div>
            </div>
        </div>

        <div class="page-footer">
            <button class="nav-btn">Next →</button>
        </div>
    </div>
</div>

<button id="feedAddPostBtn" class="floating-post-btn">+ Post</button>

<div id="createPostOverlay" class="create-post-overlay hidden">
    <div class="create-post-modal">
        <h3>Create Post</h3>

        <textarea id="postText" class="create-post-textarea" placeholder="Write something..."></textarea>

        <label for="postImage" class="file-label">Add picture</label>
        <input type="file" id="postImage" accept="image/*">

        <img id="postPreview" class="post-preview hidden" alt="Preview image">

        <div class="create-post-actions">
            <button type="button" id="cancelPostBtn" class="modal-btn secondary-btn">Cancel</button>
            <button type="button" id="submitPostBtn" class="modal-btn primary-btn">Post</button>
        </div>
    </div>
</div>
<script src="feed.js"></script>


</body>
</html>
